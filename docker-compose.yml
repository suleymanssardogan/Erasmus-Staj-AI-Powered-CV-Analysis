version: '3.8'

services:
  web:
    build: .
    container_name: ocr-web-app
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
    restart: always
    environment:
      - FLASK_ENV=production

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ocr-n8n-automation
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.local/share/n8n
    environment:
      - N8N_SECURE_COOKIE=false
    restart: always

volumes:
  n8n_data:
